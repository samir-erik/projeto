name: Robô do Portal de Notícias

# Define QUANDO o robô vai rodar
on:
  schedule:
    # Roda a cada 6 horas (ex: 00:00, 06:00, 12:00, 18:00)
    - cron: '0 */6 * * *'
  
  # Cria um botão no GitHub para você rodar manualmente quando quiser testar
  workflow_dispatch: 

jobs:
  buscar_noticias:
    runs-on: ubuntu-latest # O GitHub empresta um servidor Linux

    steps:
    - name: 📥 Baixar o código do repositório
      uses: actions/checkout@v4

    - name: 🐍 Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Instalar bibliotecas necessárias
      run: |
        python -m pip install --upgrade pip
        pip install requests psycopg2-binary

    - name: 🚀 Executar o script de coleta
      # Certifique-se de que o nome do arquivo aqui é o que faz a busca real!
      run: python bot.py