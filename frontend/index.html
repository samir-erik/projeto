<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal de Notícias</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>📰 Portal de Notícias</h1></header>
    
    <div class="busca">
        <input type="text" id="campoBusca" placeholder="🔎 Buscar notícias..." oninput="buscar()">
        
        <!-- NOVO: Campo de Data -->
        <input type="date" id="campoData" onchange="buscarPorData()" style="margin-top: 10px; padding: 10px 20px; border-radius: 50px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); outline: none;">
    </div>

    <div class="categorias">
        <button onclick="carregarNoticias()">Todas</button>
        <button onclick="filtrar('Tecnologia')">Tecnologia</button>
        <button onclick="filtrar('Esportes')">Esportes</button>
        <button onclick="filtrar('Economia')">Economia</button>
        <button onclick="mostrarAbaAnalise()" style="background: #28a745; color: white;">📊 Dashboard</button>
    </div>

    <div class="container" id="noticias"></div>

    <script src="script.js"></script>
</body>
</html>
