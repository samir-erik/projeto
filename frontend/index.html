<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Notícias</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📰 Portal de Notícias</h1>
</header>

<div class="busca">
    <input 
        type="text" 
        id="campoBusca" 
        placeholder="🔎 Buscar notícias..."
        oninput="buscar()"
    >
</div>

 <div class="categorias">
    <button onclick="carregarNoticias()">Todas</button>
    <button onclick="filtrar('Tecnologia')">Tecnologia</button>
    <button onclick="filtrar('Esportes')">Esportes</button>
    <button onclick="filtrar('Economia')">Economia</button>
    <button onclick="filtrar('Geral')">Geral</button>
</div> 

<div class="analise-btn">
    <button onclick="carregarDashboard()">📊 Ver Análise de Dados</button>
</div>

<div id="painelAnalise" style="display:none; padding: 20px; background: white; margin: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
    <h2>Estatísticas do Portal</h2>
    <div id="statsConteudo"></div>
    <button onclick="document.getElementById('painelAnalise').style.display='none'">Fechar</button>
</div>

<div class="container" id="noticias"></div>

<script src="script.js"></script>
    
</body>
</html>
